<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XUN / 技术和踩坑分享</title>
    <style>
        /* 引入更具硬朗感的字体 */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            overflow: hidden; /* 保持单页视觉冲击 */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 50px;
        }

        /* 左上角品牌 */
        .brand {
            font-size: clamp(8rem, 25vw, 18rem);
            font-weight: 900;
            line-height: 0.75;
            letter-spacing: -0.06em;
            text-transform: uppercase;
        }

        /* 右下角内容容器 */
        .bottom-right-zone {
            align-self: flex-end;
            text-align: right;
            max-width: 600px;
        }

        /* 核心描述 */
        .tagline {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 900;
            line-height: 1.2;
            margin-bottom: 2rem;
            letter-spacing: -0.02em;
            border-bottom: 12px solid #000;
            display: inline-block;
            padding-bottom: 5px;
        }

        /* 剩余导航链接 */
        .nav-links {
            list-style: none;
        }

        .nav-links a {
            display: block;
            font-size: 1.5rem;
            font-weight: 900;
            text-decoration: none;
            color: #000;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            transition: opacity 0.2s;
        }

        .nav-links a:hover {
            opacity: 0.5;
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            body {
                padding: 30px;
            }
            .brand {
                font-size: 25vw;
            }
            .tagline {
                font-size: 1.5rem;
                border-bottom-width: 8px;
            }
        }
    </style>
</head>
<body>

    <header class="brand">
        XUN
    </header>

    <section class="bottom-right-zone">
        <div class="tagline">
            技术和踩坑分享
        </div>
        
        <nav class="nav-links">
            <a href="/projects">PROJECTS</a>
            <a href="/about">ABOUT</a>
        </nav>

        <footer style="margin-top: 2rem; font-size: 0.8rem; font-weight: 700; opacity: 0.3;">
            XUN.ORG / 2026
        </footer>
    </section>

</body>
</html>
